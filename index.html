<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sera Kontrol Paneli</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>🌿 Akıllı Sera Takip Sistemi</h1>
    </div>
    
    <div class="container">
        <div class="card" id="sera1-card">
            <h2>Aloe Vera Serası (Sera 1)</h2>
            <div class="data-row">🌡️ Sıcaklık: <span id="temp1">--</span>°C</div>
            <div class="data-row">💧 Nem: %<span id="hum1">--</span></div>
            <div class="data-row">🪴 Toprak: %<span id="soil1">--</span></div>
            <div class="controls">
                <button onclick="kontrolEt('sera1', 'klima')">Klima: <span id="klima1-durum">KAPALI</span></button>
                <button onclick="kontrolEt('sera1', 'isik')">Işık: <span id="isik1-durum">KAPALI</span></button>
            </div>
        </div>

        <div class="card" id="sera2-card">
            <h2>Kaktüs Serası (Sera 2)</h2>
            <div class="data-row">🌡️ Sıcaklık: <span id="temp2">--</span>°C</div>
            <div class="data-row">💧 Nem: %<span id="hum2">--</span></div>
            <div class="data-row">🪴 Toprak: %<span id="soil2">--</span></div>
            <div class="controls">
                <button onclick="kontrolEt('sera2', 'klima')">Klima: <span id="klima2-durum">KAPALI</span></button>
                <button onclick="kontrolEt('sera2', 'isik')">Işık: <span id="isik2-durum">KAPALI</span></button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
